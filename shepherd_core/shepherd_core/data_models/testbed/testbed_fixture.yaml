- datatype: testbed
  parameters:
    name: unit_testing_testbed
    description: "Artificial Testbed used in unit testing"
    shared_storage: true
    data_on_server: /tmp/
    data_on_observer: /tmp/
    observers:
      - name: unit_testing_sheep
